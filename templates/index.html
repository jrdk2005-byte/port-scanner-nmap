<!DOCTYPE html>
<html>
<head>
    <title>Port Scanning with Nmap</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 40px;
            color: #38bdf8;
            font-size: 32px;
        }

        form {
            margin-top: 30px;
        }

        input, select, button {
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        input {
            width: 250px;
        }

        button {
            background: #38bdf8;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        .output {
            background: #000;
            color: #22c55e;
            padding: 20px;
            margin: 30px auto;
            width: 80%;
            text-align: left;
            white-space: pre-wrap;
            border-radius: 10px;
            overflow-x: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.5);
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<h1>🔍 Port Scanning with Nmap</h1>

<form method="POST">

    <input type="text" name="target" placeholder="Enter IP or Domain" required>

    <br>

    <select name="scan">
        <option value="basic">Basic Scan</option>
        <option value="service">Service Version Scan</option>
        <option value="aggressive">Aggressive Scan</option>
    </select>

    <br>

    <button type="submit">Start Scan</button>

</form>

<div class="output">
{{ output }}
</div>

<div class="footer">
    Built using Python + Nmap
</div>

</body>
</html>
