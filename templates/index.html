<!DOCTYPE html>
<html>
<head>
    <title>AI Port Scanning with Nmap</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
            color: white;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: auto;
            padding: 40px 0;
        }

        .hero {
            text-align: center;
            padding: 40px;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        h1 {
            font-size: 42px;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #cbd5e1;
            font-size: 18px;
        }

        form {
            margin-top: 30px;
        }

        input, select {
            padding: 14px;
            width: 260px;
            margin: 10px;
            border-radius: 10px;
            border: 1px solid #38bdf8;
            background: #020617;
            color: white;
            font-size: 16px;
        }

        button {
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            color: #020617;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.8);
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-top: 35px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 280px;
            background: rgba(2, 6, 23, 0.95);
            border: 1px solid #334155;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .card h2 {
            color: #38bdf8;
            margin-top: 0;
        }

        .output {
            background: #000;
            color: #22c55e;
            padding: 18px;
            border-radius: 12px;
            white-space: pre-wrap;
            overflow-x: auto;
            min-height: 180px;
            font-family: monospace;
            font-size: 14px;
        }

        .ai-output {
            background: #111827;
            color: #facc15;
            padding: 18px;
            border-radius: 12px;
            white-space: pre-wrap;
            min-height: 180px;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
        }

        .badge {
            display: inline-block;
            margin: 8px;
            padding: 8px 14px;
            background: #0f172a;
            border: 1px solid #38bdf8;
            border-radius: 20px;
            color: #38bdf8;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="hero">
        <h1>AI Port Scanning with Nmap</h1>
        <p class="subtitle">
            A smart cybersecurity tool that scans ports and explains results using AI.
        </p>

        <div>
            <span class="badge">Python</span>
            <span class="badge">Flask</span>
            <span class="badge">Nmap</span>
            <span class="badge">Gemini AI</span>
        </div>

        <form method="POST">
            <input type="text" name="target" placeholder="Enter IP or Domain" required>

            <select name="scan">
                <option value="basic">Basic Scan</option>
                <option value="service">Service Version Scan</option>
                <option value="aggressive">Aggressive Scan</option>
            </select>

            <button type="submit">Start AI Scan</button>
        </form>
    </div>

    <div class="cards">
        <div class="card">
            <h2>Nmap Raw Output</h2>
            <div class="output">
{{ raw_output }}
            </div>
        </div>

        <div class="card">
            <h2>AI Security Explanation</h2>
            <div class="ai-output">
{{ ai_output }}
            </div>
        </div>
    </div>

    <div class="footer">
        Built for cybersecurity learning and ethical scanning only.
    </div>

</div>

</body>
</html>
